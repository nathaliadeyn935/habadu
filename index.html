<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Magical Midnight Garden</title>

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');



        :root {

            --bg-color: #000510;

            --rose-color: #f5f5f5;

            --rose-glow: rgba(255, 255, 255, 0.5);

            --gold: #fcf6ba;

            --stem-color: #0c3d23;

            --milky-way: radial-gradient(ellipse at center, rgba(50, 100, 200, 0.15) 0%, transparent 70%);

        }



        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }



        body {

            background-color: var(--bg-color);

            background-image: var(--milky-way);

            height: 100vh; width: 100vw;

            overflow: hidden;

            display: flex; justify-content: center; align-items: flex-end;

            cursor: pointer;

        }



        /* --- SKY & MOON --- */

        .sky { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--d) infinite alternate; }

        @keyframes twinkle { from { opacity: 0.2; } to { opacity: 1; } }



        .moon {

            position: absolute; top: 8%; left: 50%; transform: translateX(-50%);

            width: 70px; height: 70px; background: #fff; border-radius: 50%;

            box-shadow: 0 0 40px 10px rgba(255,255,255,0.3); z-index: 1;

        }



        .moonlight-beam {

            position: absolute; top: 0; left: 50%; transform: translateX(-50%);

            width: 300px; height: 100%;

            background: radial-gradient(ellipse at top, rgba(255,255,255,0.08) 0%, transparent 70%);

            opacity: 0; transition: 1.5s; z-index: 2; pointer-events: none;

        }

        .alive .moonlight-beam { opacity: 1; }



        .shooting-star {

            position: absolute; background: linear-gradient(90deg, #fff, transparent);

            transform: rotate(-45deg); opacity: 0; z-index: 1;

        }

        @keyframes shoot {

            0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; }

            10% { opacity: 1; }

            25% { transform: translateX(-400px) translateY(400px) rotate(-45deg); opacity: 0; }

            100% { opacity: 0; }

        }



        /* --- MAIN ROSE --- */

        .rose-system {

            position: relative; z-index: 10;

            display: flex; flex-direction: column; align-items: center;

            margin-bottom: -2px; 

            pointer-events: auto;

        }



        .stem {

            width: 16px; height: 45vh;

            background: linear-gradient(to right, #051a0f, #0c3d23, #051a0f);

            border-radius: 12px;

            transform: rotate(-2deg);

            position: relative; z-index: 5; transition: 1s;

        }



        .leaf {

            position: absolute; width: 60px; height: 30px;

            background: var(--stem-color); border-radius: 50% 0 50% 0;

            filter: brightness(0.8); transition: 1.5s;

        }

        .l1 { top: 70px; left: 15px; transform: rotate(15deg); }

        .l2 { top: 190px; left: -50px; transform: scaleX(-1) rotate(15deg); }



        /* --- IMPROVED RIBBON --- */

        .ribbon-wrap {

            position: absolute; top: 45%; left: 50%;

            transform: translate(-50%, -50%);

            width: 120px; height: 80px; z-index: 20;

            pointer-events: none;

        }

        /* Ang part nga nag-wrap sa stem */

        .ribbon-main {

            position: absolute; width: 100%; height: 22px;

            background: #1a1a1a; 

            border-bottom: 2px solid #000;

            transform: rotate(-10deg);

            box-shadow: 0 4px 10px rgba(0,0,0,0.5);

            display: flex; justify-content: center; align-items: center;

        }

        /* Ang nagbitay nga tumoy */

        .ribbon-tail {

            position: absolute; right: 15px; top: 10px;

            width: 20px; height: 70px;

            background: #111;

            clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 85%, 0 100%);

            transform: rotate(8deg);

            box-shadow: -2px 5px 10px rgba(0,0,0,0.5);

        }

        .ribbon-label {

            font-family: 'Great Vibes', cursive; color: var(--gold);

            font-size: 1.1rem; text-shadow: 0 0 5px rgba(0,0,0,0.8);

            white-space: nowrap;

        }



        .rose-head {

            position: relative; width: 115px; height: 115px;

            margin-bottom: -15px; z-index: 10; transition: 1.5s ease-in-out;

        }

        .petal {

            position: absolute; bottom: 0; left: 50%; width: 100%; height: 100%;

            background: linear-gradient(to top, #111, #444, var(--rose-color));

            border-radius: 50% 50% 20% 20% / 80% 80% 20% 20%;

            transform-origin: bottom center; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1);

        }

        .p1 { transform: translateX(-50%); z-index: 5; }

        .p2 { transform: translateX(-50%) rotateY(72deg); z-index: 4; }

        .p3 { transform: translateX(-50%) rotateY(144deg); z-index: 3; }

        .p4 { transform: translateX(-50%) rotateY(216deg); z-index: 2; }

        .p5 { transform: translateX(-50%) rotateY(288deg); z-index: 1; }



        .alive .rose-head { transform: scale(1.3); filter: drop-shadow(0 0 30px var(--rose-glow)); }

        .alive .petal { transform: translateX(-50%) rotateX(-50deg) translateZ(35px); }

        .alive .p2 { transform: translateX(-50%) rotateY(72deg) rotateX(-50deg) translateZ(35px); }

        .alive .p3 { transform: translateX(-50%) rotateY(144deg) rotateX(-50deg) translateZ(35px); }

        .alive .p4 { transform: translateX(-50%) rotateY(216deg) rotateX(-50deg) translateZ(35px); }

        .alive .p5 { transform: translateX(-50%) rotateY(288deg) rotateX(-50deg) translateZ(35px); }

        

        .withered .rose-head { transform: scale(0.85) rotate(10deg); filter: brightness(0.2) grayscale(1); }

        .withered .stem, .withered .leaf { filter: brightness(0.3); }



        /* --- MINI ROSES (TANOM SA UBOS) --- */

        .mini-rose {

            position: absolute; bottom: 0; z-index: 5; 

            display: flex; flex-direction: column; align-items: center;

            transform-origin: bottom;

            animation: growAndBloom var(--d) forwards ease-out;

        }



        @keyframes growAndBloom {

            0% { transform: scaleY(0); opacity: 0; }

            20% { transform: scaleY(1); opacity: 1; }

            80% { opacity: 1; transform: scaleY(1); }

            100% { opacity: 0; transform: scaleY(0.8); }

        }



        .mini-bud { 

            position: relative; width: 30px; height: 35px; 

            transition: 1s; transform: scale(0);

            animation: bloomPetals var(--d) forwards;

        }

        @keyframes bloomPetals {

            20% { transform: scale(0); }

            35% { transform: scale(var(--s)); }

            100% { transform: scale(var(--s)); }

        }



        .m-petal {

            position: absolute; bottom: 0; width: 100%; height: 100%;

            background: linear-gradient(to top, #444, #fff);

            border-radius: 50% 50% 20% 20%; box-shadow: 0 0 10px rgba(255,255,255,0.5);

            transform-origin: bottom center;

        }

        .mp1 { transform: rotateX(-20deg); }

        .mp2 { transform: rotateY(120deg) rotateX(-20deg); }

        .mp3 { transform: rotateY(240deg) rotateX(-20deg); }



        .mini-stem { 

            width: 4px; 

            height: var(--h); /* Random Height */

            background: linear-gradient(to top, #051a0f, var(--stem-color)); 

            border-radius: 2px;

        }

    </style>

</head>

<body class="withered" id="theBody">



    <div class="sky" id="sky"></div>

    <div class="moon"></div>

    <div class="moonlight-beam"></div>



    <div class="rose-system" id="bigRoseArea">

        <div class="rose-head">

            <div class="petal p1"></div><div class="petal p2"></div>

            <div class="petal p3"></div><div class="petal p4"></div>

            <div class="petal p5"></div>

        </div>

        <div class="stem">

            <div class="leaf l1"></div><div class="leaf l2"></div>

            <div class="ribbon-wrap">

                <div class="ribbon-main">

                    <span class="ribbon-label">happy birthday, Raze!</span>

                </div>

                <div class="ribbon-tail"></div>

            </div>

        </div>

    </div>



    <script>

        const body = document.getElementById('theBody');

        const bigRoseArea = document.getElementById('bigRoseArea');

        const sky = document.getElementById('sky');



        // Stars Generation

        for (let i = 0; i < 130; i++) {

            const star = document.createElement('div');

            star.className = 'star';

            const size = Math.random() * 2 + 'px';

            star.style.width = size; star.style.height = size;

            star.style.top = Math.random() * 80 + '%';

            star.style.left = Math.random() * 100 + '%';

            star.style.setProperty('--d', (Math.random() * 3 + 1) + 's');

            sky.appendChild(star);

        }



        // Shooting Stars

        setInterval(() => {

            if(Math.random() > 0.4) {

                const s = document.createElement('div');

                s.className = 'shooting-star';

                s.style.width = Math.random() > 0.6 ? '160px' : '70px';

                s.style.height = '1px';

                s.style.top = Math.random() * 40 + '%';

                s.style.left = (Math.random() * 50 + 50) + '%';

                s.style.animation = `shoot ${Math.random()*1.5 + 1}s linear forwards`;

                sky.appendChild(s);

                setTimeout(() => s.remove(), 2500);

            }

        }, 5000);



        let mainTimer;



        bigRoseArea.addEventListener('click', (e) => {

            e.stopPropagation();

            clearTimeout(mainTimer);

            body.classList.remove('withered');

            body.classList.add('alive');

            mainTimer = setTimeout(() => {

                body.classList.remove('alive');

                body.classList.add('withered');

            }, 12000);

        });



        body.addEventListener('click', (e) => {

            if (e.target.id === 'theBody' || e.target.id === 'sky') {

                spawnMiniRose(e.clientX);

            }

        });



        function spawnMiniRose(x) {

            const mini = document.createElement('div');

            mini.className = 'mini-rose';

            

            // Random Height: base 40px up to half of the screen height

            const randomHeight = Math.floor(Math.random() * (window.innerHeight / 2.5)) + 40;

            const scale = (Math.random() * 0.5 + 0.5).toFixed(2);

            const duration = (Math.random() * 2 + 4).toFixed(1) + 's';

            

            mini.style.left = x + 'px';

            mini.style.setProperty('--h', randomHeight + 'px');

            mini.style.setProperty('--s', scale);

            mini.style.setProperty('--d', duration);

            

            mini.innerHTML = `

                <div class="mini-bud">

                    <div class="m-petal mp1"></div>

                    <div class="m-petal mp2"></div>

                    <div class="m-petal mp3"></div>

                </div>

                <div class="mini-stem"></div>

            `;

            document.body.appendChild(mini);

            setTimeout(() => mini.remove(), parseFloat(duration) * 1000);

        }



        // Auto-bloom on start

        window.onload = () => {

            body.classList.remove('withered');

            body.classList.add('alive');

            mainTimer = setTimeout(() => {

                body.classList.add('withered');

                body.classList.remove('alive');

            }, 8000);

        };

    </script>

</body>

</html>
